<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ipdf — Markdown / Word → iPhone PDF</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">ipdf</span>
      <span class="tagline">Markdown / Word → iPhone-ready PDF</span>
    </div>
    <button id="settings-toggle" class="icon-btn" aria-label="Settings" title="Settings">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <path fill="currentColor" d="M19.14 12.94a7.49 7.49 0 0 0 .05-.94 7.49 7.49 0 0 0-.05-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.03 7.03 0 0 0-1.62-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96a.5.5 0 0 0-.6.22L2.18 8.84a.5.5 0 0 0 .12.64l2.03 1.58c-.03.31-.05.62-.05.94 0 .32.02.63.05.94L2.3 14.52a.5.5 0 0 0-.12.64l1.92 3.32c.14.24.43.34.7.22l2.39-.96c.49.38 1.03.7 1.62.94l.36 2.54c.04.24.25.42.5.42h3.84c.25 0 .46-.18.5-.42l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.27.12.56.02.7-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58ZM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7Z"/>
      </svg>
    </button>
  </header>

  <main>
    <div class="mode-toggle" role="tablist" aria-label="Input mode">
      <button id="mode-upload" class="mode-btn active" role="tab" aria-selected="true">
        Upload file
      </button>
      <button id="mode-paste" class="mode-btn" role="tab" aria-selected="false">
        Paste Markdown
      </button>
    </div>

    <form id="convert-form">
      <div id="view-upload">
        <label id="dropzone" for="file-input" class="dropzone" tabindex="0">
          <input id="file-input" name="file" type="file"
                 accept="{{ choices.accept | join(',') }}" hidden>
          <div class="dz-inner">
            <svg class="dz-icon" viewBox="0 0 24 24" width="56" height="56" aria-hidden="true">
              <path fill="currentColor" d="M12 3a1 1 0 0 1 1 1v8.59l2.3-2.3a1 1 0 0 1 1.4 1.42l-4 4a1 1 0 0 1-1.4 0l-4-4a1 1 0 1 1 1.4-1.42l2.3 2.3V4a1 1 0 0 1 1-1Z"/>
              <path fill="currentColor" d="M5 15a1 1 0 0 1 1 1v2a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-2a1 1 0 1 1 2 0v2a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3v-2a1 1 0 0 1 1-1Z"/>
            </svg>
            <p class="dz-title">Drag &amp; drop your document</p>
            <p class="dz-sub">or <span class="link">choose a file</span> — Markdown or Word (.docx)</p>
          </div>
        </label>
      </div>

      <div id="view-paste" hidden>
        <textarea id="paste-input" class="paste-area" spellcheck="false"
          placeholder="# Paste your Markdown here&#10;&#10;Then press Convert to PDF…"></textarea>
        <div class="paste-actions">
          <span id="paste-hint" class="paste-hint"></span>
          <button id="paste-convert" type="button" class="primary-btn">Convert to PDF</button>
        </div>
      </div>
    </form>

    <div id="status" class="status" role="status" aria-live="polite" hidden></div>
  </main>

  <!-- Settings panel -->
  <div id="overlay" class="overlay" hidden></div>
  <aside id="settings-panel" class="panel" aria-hidden="true">
    <div class="panel-head">
      <h2>Reading options</h2>
      <button id="settings-close" class="icon-btn" aria-label="Close settings">✕</button>
    </div>
    <div class="panel-body">
      <label class="field">
        <span>iPhone model</span>
        <select id="opt-preset"></select>
      </label>
      <label class="field">
        <span>Theme</span>
        <select id="opt-theme"></select>
      </label>
      <label class="field">
        <span>Font</span>
        <select id="opt-font"></select>
      </label>
      <label class="field">
        <span>Font size (pt) <em>— blank = auto</em></span>
        <input id="opt-font-size" type="number" min="6" max="36" step="0.5" placeholder="auto">
      </label>
      <label class="field">
        <span>Margin (inches)</span>
        <input id="opt-margin" type="number" min="0" max="2" step="0.05">
      </label>
      <label class="field">
        <span>Line height</span>
        <input id="opt-line-height" type="number" min="1" max="2.5" step="0.1">
      </label>
      <label class="field">
        <span>Document title <em>— optional</em></span>
        <input id="opt-title" type="text" placeholder="auto (first heading)">
      </label>
      <label class="field checkbox">
        <input id="opt-hyphenate" type="checkbox">
        <span>Automatic hyphenation</span>
      </label>
      <button id="reset-defaults" type="button" class="ghost-btn">Reset to defaults</button>
    </div>
  </aside>

  <footer class="footer">Files are converted on the fly and never stored.</footer>

  <!-- Option metadata as inert data (not executed) so the CSP can forbid
       inline scripts. app.js reads and parses this. -->
  <script id="ipdf-choices" type="application/json">{{ choices | tojson }}</script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
